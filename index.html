<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" type="module" defer></script>
</head>
<body>
  <header class="header">
    <form class="header__form search-form" data-js-search-form>
      <input class="search-form__input" type="search" placeholder="Search" data-js-search-form-input>
      <button class="search-form__button">Search</button>
    </form>
  </header>
  <main class="weather" data-js-weather></main>
</body>
</html>
